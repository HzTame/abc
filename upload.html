<!doctype html><html lang="th"><head><meta charset="UTF-8"><meta content="width=device-width,initial-scale=1" name="viewport"><title>Upload - The Audio Vault</title><link href="./styles.css?v=20260623-comment-login-center-1" rel="stylesheet"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="./security.js?v=20260623-server-watch-1" defer="defer"></script><script src="./upload.js?v=20260623-server-security-1" defer="defer"></script></head><body><header class="site-header"><a href="./index.html" class="brand" aria-label="The Audio Vault"><span class="brand-mark">A</span> <span>The Audio Vault</span></a><nav aria-label="เมนูหลัก" class="top-nav"><a href="./index.html">Home</a> <a href="./list.html">list</a> <a href="./comm.html">Comm</a> <a href="./about.html">เกี่ยวกับ</a> <a href="./upload.html" class="active-link" data-auth-only hidden>upload</a> <a href="./admin.html" hidden data-admin-only>admin</a></nav><div class="header-actions"><button class="login-button" id="logoutButton" type="button" hidden>logout</button></div></header><main><section class="upload-hero"><div><p class="eyebrow">uploader</p><h1>อัปโหลดไฟล์และเพลง</h1><p>เลือกหมวดแล้วอัปโหลด Loop, Plugin, Project, Music หรือ Fx ได้จากหน้าเดียว</p></div><div class="upload-status" id="configStatus">กำลังตรวจสอบ</div></section><section class="uploader-shell"><section class="upload-card"><div class="compact-head section-head"><div><p class="section-kicker">รายละเอียดไฟล์</p><h2>เพิ่มรายการใหม่</h2></div></div><form class="upload-form" id="assetForm"><label>ชื่อผลงาน <input id="assetTitle" placeholder="ระบบจะใช้ชื่อไฟล์ให้อัตโนมัติ หรือพิมพ์ชื่อเอง"></label><div class="form-grid"><label>หมวด <select id="assetCategory" required><option value="loop">Loop</option><option value="plugin">Plugin</option><option value="project">Project</option><option value="music">Music</option><option value="sample">Fx</option></select></label> <label>รูปแบบไฟล์ / BPM <input id="assetFormat" placeholder="WAV · 140 BPM หรือ VST3 · AU"></label></div><label>แท็ก <input id="assetTags" placeholder="hiphop, remix, free download (คั่นด้วยเครื่องหมายจุลภาค)"></label> <label>รายละเอียด <textarea id="assetDescription" placeholder="อธิบายผลงาน เครดิต หรือเงื่อนไขการนำไปใช้" rows="4"></textarea></label><div class="drop-grid"><label class="file-drop" data-drop-zone="assetFile"><span id="mainFileType">ไฟล์ดาวน์โหลด</span> <strong id="fileName">ลากไฟล์มาวาง หรือคลิกเลือก</strong> <small id="fileHelp">รองรับไฟล์ทั่วไปและเลือกได้หลายไฟล์</small> <input id="assetFile" type="file" multiple="multiple" required></label> <label class="file-drop" data-drop-zone="assetCover"><span>รูปปก</span> <strong id="coverName">ลากรูปปกมาวาง หรือคลิกเลือก</strong> <small>JPG, PNG หรือ WEBP · ถ้าไม่ใส่ระบบจะใช้ปกเริ่มต้น</small> <input id="assetCover" type="file" accept="image/*"></label></div><div class="progress"><span id="progressBar"></span></div><p class="upload-state" aria-live="polite" id="uploadState" role="status">พร้อมอัปโหลด</p><button class="form-action primary-action" id="uploadButton" type="submit">อัปโหลดและเผยแพร่</button></form></section></section></main><footer class="footer"><span>The Audio Vault</span> <span>© 2026 RAPEEPHAT REMIX</span></footer><div class="toast" id="toast" aria-live="polite" role="status"></div></body></html>
